<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emmanuel Sackey</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; }
    .task-dates { font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <div class="container py-4" style="max-width: 540px;">
    <div class="card shadow-lg border-0">
      <div class="card-body pb-0">
        <h1 class="card-title h3 mb-4">Emmanuel Sackey</h1>
        <div class="mb-4">
          <input type="text" class="form-control mb-2" id="taskInput" placeholder="Enter a task..." maxlength="200">
          <div class="row g-2 align-items-end">
            <div class="col-sm">
              <label for="startDate" class="form-label small text-secondary mb-0">Start</label>
              <input type="date" class="form-control form-control-sm" id="startDate">
            </div>
            <div class="col-sm">
              <label for="dueDate" class="form-label small text-secondary mb-0">Due</label>
              <input type="date" class="form-control form-control-sm" id="dueDate">
            </div>
            <div class="col-sm-auto d-flex gap-1">
              <button class="btn btn-primary" id="addBtn">Add Task</button>
              <button class="btn btn-outline-secondary" id="cancelBtn" style="display:none">Cancel</button>
            </div>
          </div>
        </div>
      </div>
      <ul class="list-group list-group-flush" id="taskList"></ul>
    </div>
  </div>

  <script>
    let tasks = [];

    const STORAGE_KEY = 'taskmanager_tasks';

    const input = document.getElementById('taskInput');
    const startDateInput = document.getElementById('startDate');
    const dueDateInput = document.getElementById('dueDate');
    const addBtn = document.getElementById('addBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const list = document.getElementById('taskList');
    let editingId = null;

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function load() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        try { tasks = JSON.parse(data); } catch { tasks = []; }
      }
    }

    function render() {
      if (tasks.length === 0) {
        list.innerHTML = '<li class="list-group-item text-muted fst-italic">No tasks yet</li>';
        return;
      }
      list.innerHTML = tasks.map(t => {
        const dateParts = [];
        if (t.startDate) dateParts.push('Start: ' + t.startDate);
        if (t.dueDate) dateParts.push('Due: ' + t.dueDate);
        const datesHtml = dateParts.length ? '<span class="task-dates">' + dateParts.join(' | ') + '</span>' : '';
        return '<li class="list-group-item d-flex justify-content-between align-items-center"><div><span>' + escapeHtml(t.title) + '</span>' + datesHtml + '</div><div class="btn-group btn-group-sm"><button class="btn btn-outline-primary edit-btn" data-id="' + t.id + '">✎</button><button class="btn btn-outline-danger delete-btn" data-id="' + t.id + '">✕</button></div></li>';
      }).join('');
      list.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => editTask(btn.dataset.id));
      });
      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteTask(btn.dataset.id));
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function addTask() {
      const title = input.value.trim();
      if (!title) return;
      const startDate = startDateInput.value;
      const dueDate = dueDateInput.value;
      if (editingId) {
        const idx = tasks.findIndex(t => String(t.id) === editingId);
        if (idx !== -1) { tasks[idx].title = title; tasks[idx].startDate = startDate; tasks[idx].dueDate = dueDate; }
        editingId = null;
        addBtn.textContent = 'Add Task';
        cancelBtn.style.display = 'none';
      } else {
        tasks.push({ id: String(Date.now()) + String(Math.random()).slice(2), title, startDate, dueDate });
      }
      input.value = '';
      startDateInput.value = '';
      dueDateInput.value = '';
      save();
      render();
    }

    function editTask(id) {
      const task = tasks.find(t => String(t.id) === id);
      if (!task) return;
      input.value = task.title;
      startDateInput.value = task.startDate || '';
      dueDateInput.value = task.dueDate || '';
      addBtn.textContent = 'Update Task';
      cancelBtn.style.display = 'inline-block';
      editingId = id;
      input.focus();
    }

    function cancelEdit() {
      input.value = '';
      startDateInput.value = '';
      dueDateInput.value = '';
      addBtn.textContent = 'Add Task';
      cancelBtn.style.display = 'none';
      editingId = null;
    }

    function deleteTask(id) {
      if (!confirm('Are you sure you want to delete this task?')) return;
      tasks = tasks.filter(t => String(t.id) !== id);
      if (editingId === id) cancelEdit();
      save();
      render();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
      if (e.key === 'Escape') cancelEdit();
    });
    addBtn.addEventListener('click', addTask);
    cancelBtn.addEventListener('click', cancelEdit);

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    load();
    render();
    startDateInput.value = today();
    dueDateInput.value = today();
  </script>
</body>
</html>
