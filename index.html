<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 16px; }
    .form { display: flex; gap: 8px; margin-bottom: 16px; }
    .form input { flex: 1; padding: 8px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .form button { padding: 8px 16px; font-size: 1rem; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .empty { color: #888; font-style: italic; }
    .delete-btn { background: none; border: none; color: #c00; cursor: pointer; font-size: 1rem; padding: 0 4px; }
  </style>
</head>
<body>
  <h1>Task Manager</h1>
  <div class="form">
    <input type="text" id="taskInput" placeholder="Enter a task..." maxlength="200">
    <button id="addBtn">Add Task</button>
  </div>
  <ul id="taskList"></ul>

  <script>
    let tasks = [];

    const STORAGE_KEY = 'taskmanager_tasks';

    const input = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('taskList');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function load() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        try { tasks = JSON.parse(data); } catch { tasks = []; }
      }
    }

    function render() {
      if (tasks.length === 0) {
        list.innerHTML = '<li class="empty">No tasks yet</li>';
        return;
      }
      list.innerHTML = tasks.map(t => `<li><span>${escapeHtml(t.title)}</span><button class="delete-btn" data-id="${t.id}">✕</button></li>`).join('');
      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteTask(btn.dataset.id));
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function addTask() {
      const title = input.value.trim();
      if (!title) return;
      tasks.push({ id: String(Date.now()) + String(Math.random()).slice(2), title });
      input.value = '';
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
    addBtn.addEventListener('click', addTask);

    load();
    render();
  </script>
</body>
</html>
